name: Node.js CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 22
      uses: actions/setup-node@v5
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: package-lock.json

    # 1. Cache node_modules (fast dependency restore)
    - name: Cache npm dependencies
      id: cache-npm
      uses: actions/cache@v5
      with:
        path: node_modules
        key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: Install dependencies
      if: steps.cache-npm.outputs.cache-hit != 'true'
      run: npm ci

    # 2. Cache Next.js build artifacts (biggest win for repeated builds)
    - name: Cache Next.js
      uses: actions/cache@v5
      with:
        path: |
          .next/cache
          .next/static
        key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.{js,jsx,ts,tsx}', 'next.config.*', 'tailwind.config.*', 'postcss.config.*') }}
        restore-keys: |
          ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

    - name: Build
      run: npm run build
      env:
        FM_CLIENT_ADMIN_API_URL: ${{ vars.FM_CLIENT_ADMIN_API_URL }}
        NEXT_PUBLIC_FM_ADMIN_IMAGE_URL_PREFIX: ${{ vars.NEXT_PUBLIC_FM_ADMIN_IMAGE_URL_PREFIX }}
        NEXT_TELEMETRY_DISABLED: 1   # Small speedup